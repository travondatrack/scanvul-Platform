version: '3.8'

services:
  minio:
    image: minio/minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      timeout: 5s
      retries: 5

  api:
    build: 
      context: ./apps/api
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_URL=${UPSTASH_REDIS_URL:-}
      - UPSTASH_REDIS_URL=${UPSTASH_REDIS_URL:-}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL:-}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN:-}
      - SCAN_WORKER_MODE=celery
      - STORAGE_BACKEND=s3
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadminpassword
      - MINIO_BUCKET=scans
    ports:
      - "8000:8000"
    depends_on:
      minio:
        condition: service_healthy

  worker:
    build: 
      context: ./apps/api
      dockerfile: Dockerfile
    restart: always
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - REDIS_URL=${UPSTASH_REDIS_URL:?UPSTASH_REDIS_URL is required for Celery worker}
      - UPSTASH_REDIS_URL=${UPSTASH_REDIS_URL:?UPSTASH_REDIS_URL is required for Celery worker}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL:-}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN:-}
      - SCAN_WORKER_MODE=celery
      - STORAGE_BACKEND=s3
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadminpassword
      - MINIO_BUCKET=scans
    depends_on:
      minio:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build: 
      context: ./apps/web
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=super_secret_production_key_123
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  minio_data:
