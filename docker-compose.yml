services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8001
      BACKEND_API_BASE_URL: http://api:8000
      NEXT_PUBLIC_DEFAULT_LOCALE: en
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    ports:
      - "3001:3000"
    depends_on:
      - api

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${UPSTASH_REDIS_URL:-}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: scans
      MAX_UPLOAD_BYTES: 524288000
      RATE_LIMIT_PER_MINUTE: 60
      PRESIGNED_UPLOAD_EXPIRY_SECONDS: 900
      CAPTCHA_SECRET_KEY: ${CAPTCHA_SECRET_KEY:-}
      LLM_PROVIDER: openai
      LLM_MODEL: gpt-4o-mini
      LLM_API_KEY: ${LLM_API_KEY:-}
    ports:
      - "8001:8000"
    depends_on:
      - minio

  worker:
    profiles: ["worker"]
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: celery -A app.worker.celery_app worker --loglevel=INFO --concurrency=2 --uid=nobody --gid=nogroup
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: ${UPSTASH_REDIS_URL:?UPSTASH_REDIS_URL is required for Celery worker}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: scans
      MAX_UPLOAD_BYTES: 524288000
      RATE_LIMIT_PER_MINUTE: 60
      PRESIGNED_UPLOAD_EXPIRY_SECONDS: 900
      CAPTCHA_SECRET_KEY: ${CAPTCHA_SECRET_KEY:-}
      LLM_PROVIDER: openai
      LLM_MODEL: gpt-4o-mini
      LLM_API_KEY: ${LLM_API_KEY:-}
    depends_on:
      - api

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data:
